<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Farm - Management</title>
    <link rel="stylesheet" href="css/style.css">
  
  
  </head>
<body>
    <header>
        <h1>Your Farm</h1>
    </header>

    <div class="container">
        <!-- Dashboard / Summary Section -->
        <section id="dashboard">
            <h2>হিসাবের সামারি (Summary)</h2>
            <div class="filter-section">
                <label>তারিখ অনুযায়ী ফিল্টার:</label>
                <input type="date" id="start-date"> থেকে 
                <input type="date" id="end-date">
                <button onclick="filterData()">Filter</button>
                <button onclick="resetFilter()">Reset</button>
            </div>
            
            <div class="summary-cards">
                           <!-- বিস্তারিত খরচের টেবিল -->
            <div id="expense-report" class="report-section" style="display: none;">
                <h3>নির্দিষ্ট তারিখের খরচের বিস্তারিত তালিকা</h3>
                <table>
                    <thead>
                        <tr>
                            <th>তারিখ</th>
                            <th>প্রজেক্ট</th>
                            <th>খাত</th>
                            <th>বিবরণ</th>
                            <th>টাকা</th>
                        </tr>
                    </thead>
                    <tbody id="expense-table-body">
                        <!-- জাভাস্ক্রিপ্ট থেকে ডাটা এখানে আসবে -->
                    </tbody>
                </table>
            </div>
            <div id="income-report" class="report-section" style="display: none;">
                <h3 class="income-title">নির্দিষ্ট তারিখের আয়ের বিস্তারিত তালিকা</h3>
                <table>
                    <thead>
                        <tr>
                            <th>তারিখ</th>
                            <th>প্রজেক্ট</th>
                            <th> পরিমাণ (কেজি/পিস)</th>
                            <th>টাকা</th>
                        </tr>
                    </thead>
                    <tbody id="income-table-body">
                        </tbody>
                </table>
            </div>
                <div class="card income">
                    <h3>মোট আয়</h3>
                    <p><span id="total-income">0</span> ৳</p>
                </div>
                <div class="card expense">
                    <h3>মোট খরচ</h3>
                    <p><span id="total-expense">0</span> ৳</p>
                </div>
                <div class="card profit">
                    <h3>মোট লাভ / মোট ক্ষতি</h3>
                    <p><span id="total-profit">0</span> ৳</p>
                </div>
            </div>
        </section>

        <!-- Members Section -->
        <section id="members">
            <h2>আমাদের টিম (১০ জন)</h2>
            <div class="member-grid" id="member-container">
                <!-- JavaScript দিয়ে এখানে ১০ জনের ছবি ও নাম তৈরি করা হবে -->
            </div>
        </section>

        <!-- Data Entry Section -->
        <section id="data-entry">
            <h2>হিসাব এন্ট্রি করুন</h2>
            <form id="farm-form">
                <div class="form-group">
                    <label>তারিখ:</label>
                    <input type="date" id="entry-date" required>
                </div>

                <div class="form-group">
                    <label>এন্ট্রির ধরন:</label>
                    <select id="entry-type" onchange="toggleFields()" required>
                        <option value="income">আয় (Income)</option>
                        <option value="expense">খরচ (Expense)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>প্রজেক্টের নাম:</label>
                    <select id="project-name" required>
                        <option value="কলা বাগান">কলা বাগান</option>
                        <option value="লেবু বাগান">লেবু বাগান</option>
                        <option value="বরই বাগান">বরই বাগান</option>
                    </select>
                </div>

                <!-- খরচের খাত (শুধু খরচ সিলেক্ট করলে দেখাবে) -->
                <div class="form-group" id="expense-category" style="display:none;">
                    <label>খরচের খাত:</label>
                    <select id="expense-type">
                        <option value="লেবার বিল">লেবার বিল</option>
                        <option value="সার">সার</option>
                        <option value="বিষ">বিষ/কীটনাশক</option>
                        <option value="অন্যান্য">অন্যান্য</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>পরিমাণ/বিবরণ (যেমন: ৫০ কেজি বা ২ জন লেবার):</label>
                    <input type="text" id="entry-details" placeholder="পরিমাণ লিখুন" required>
                </div>

                <div class="form-group">
                    <label>টাকার পরিমাণ (৳):</label>
                    <input type="number" id="entry-amount" placeholder="টাকার পরিমাণ লিখুন" required>
                </div>

                <button type="submit" class="submit-btn">সেভ করুন</button>
     
            </form>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
